<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu - # 91 VRS Cafe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Page Specific Styles */
        .search-wrap {
            padding: 12px 16px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 73px;
            /* Header height approx */
            z-index: 90;
            border-bottom: 1px solid var(--border);
        }

        .categories-wrap {
            padding: 12px 16px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            background: var(--bg-dark);
        }

        .categories-wrap::-webkit-scrollbar {
            display: none;
        }

        .categories {
            display: flex;
            gap: 10px;
        }

        .cat-btn {
            padding: 8px 16px;
            border-radius: 100px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .cat-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .main {
            padding: 20px 16px 100px;
            /* Bottom padding for cart bar */
            max-width: 800px;
            margin: 0 auto;
        }

        .section-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            margin-top: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
        }

        .section-count {
            font-size: 13px;
            color: var(--text-muted);
        }

        .trending-section {
            overflow: hidden;
            margin: 0 -16px;
            padding: 0 16px;
        }

        .trending-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 20px;
            padding-top: 4px;
            scrollbar-width: none;
        }

        .trending-scroll::-webkit-scrollbar {
            display: none;
        }

        .trend-card {
            min-width: 160px;
            width: 160px;
            flex-shrink: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .trend-img {
            height: 120px;
            width: 100%;
            position: relative;
        }

        .trend-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .trend-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .trend-info {
            padding: 12px;
        }

        .trend-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trend-price {
            color: var(--accent);
            font-weight: 700;
            font-size: 14px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        /* Menu Card Specifics */
        .menu-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .menu-name {
            font-weight: 600;
            font-size: 15px;
            line-height: 1.3;
        }

        .menu-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }

        .menu-price {
            font-weight: 700;
            color: var(--accent);
            font-size: 16px;
        }

        .add-btn {
            background: var(--bg-card-hover);
            color: var(--text-dark);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        .qty-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            font-size: 16px;
        }

        .qty-val {
            font-size: 13px;
            font-weight: 700;
            min-width: 16px;
            text-align: center;
        }

        /* Cart Bar */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            max-width: 600px;
            margin: 0 auto;
        }

        .cart-bar-inner {
            background: rgba(12, 12, 12, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        .cart-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-icon {
            position: relative;
            font-size: 24px;
            color: var(--accent);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -8px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .cart-info-title {
            font-weight: 700;
            font-size: 14px;
        }

        .cart-info-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .cart-btn {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: var(--accent);
        }

        /* Cart Modal Specifics */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .cart-item-price {
            font-size: 12px;
            color: var(--text-muted);
        }

        .empty {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="bg-pattern"></div>
    <div class="grain"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:12px;">
                <div class="logo-icon">☕</div>
                <div class="logo-text"># 91 VRS</div>
            </a>
        </div>

        <div
            style="font-weight: 700; font-family: 'Playfair Display', serif; font-size: 18px; position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap;">
            Table <span id="tableNum" class="text-accent">5</span>
        </div>

        <div class="header-actions" style="display:flex; gap:8px;">
            <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">
                <i class="ri-moon-line" id="themeIcon"></i>
            </button>
            <button class="btn-icon" id="vegBtn" onclick="toggleVeg()">
                <span style="font-size: 14px;">🥬</span>
            </button>
            <button class="btn-icon" onclick="showOrders()">
                <i class="ri-file-list-3-line"></i>
            </button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-wrap">
        <div style="position: relative;">
            <i class="ri-search-line" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);"></i>
            <input type="text" id="searchInput" class="input" style="padding-left: 42px;"
                placeholder="Search dishes (e.g. coffee, burger)...">
        </div>
    </div>

    <!-- Categories -->
    <div class="categories-wrap">
        <div class="categories" id="categories">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <!-- Trending -->
        <section class="trending-section" id="trendingSection">
            <div class="section-head">
                <h2 class="section-title text-accent font-serif">Trending Now</h2>
            </div>
            <div class="trending-scroll" id="trendingList">
                <!-- Rendered by JS -->
            </div>
        </section>

        <!-- Menu Grid -->
        <section>
            <div class="section-head">
                <h2 class="section-title font-serif" id="menuTitle">All Items</h2>
                <span class="section-count" id="menuCount">0 items</span>
            </div>

            <div class="menu-grid" id="menuGrid">
                <!-- Rendered by JS -->
            </div>

            <div class="empty hidden" id="emptyState">
                <div class="empty-icon">🔍</div>
                <h3>No items found</h3>
                <p>Try searching for something else</p>
            </div>
        </section>
    </main>

    <!-- Bottom Cart Bar -->
    <div class="cart-bar hidden" id="cartBar">
        <div class="cart-bar-inner" onclick="openCart()">
            <div class="cart-left">
                <div class="cart-icon">
                    <i class="ri-shopping-bag-3-fill"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                </div>
                <div class="cart-info">
                    <div class="cart-info-title">View Cart</div>
                    <div class="cart-info-sub"><span id="cartItems">0 items</span> • ₹<span id="cartTotal">0</span>
                    </div>
                </div>
            </div>
            <div class="cart-btn">
                Checkout <i class="ri-arrow-right-s-line"></i>
            </div>
        </div>
    </div>

    <!-- Cart Modal (Bottom Sheet style) -->
    <div class="modal-overlay" id="overlay" onclick="closeCart()"></div>
    <div class="modal modal-bottom" id="cartModal"
        style="background: var(--bg-dark); border-top: 1px solid var(--border);">
        <div
            style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h2 class="font-serif" style="font-size: 20px;">Your Cart</h2>
            <button class="btn-icon" onclick="closeCart()"><i class="ri-close-line"></i></button>
        </div>

        <div style="flex: 1; overflow-y: auto; padding: 20px;" id="cartBody">
            <div id="cartList"></div>

            <div style="margin-top: 24px;">
                <label class="text-muted"
                    style="font-size: 12px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block;">Your
                    Details</label>
                <input type="text" class="input" id="custName" placeholder="Your Name" style="margin-bottom: 12px;">
                <textarea class="input" id="custNotes" placeholder="Special Instructions..."
                    style="min-height: 80px; resize: none;"></textarea>
            </div>

            <div class="card" style="margin-top: 24px; background: rgba(255,255,255,0.02);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
                    <span class="text-muted">Subtotal</span>
                    <span>₹<span id="billSub">0</span></span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px;">
                    <span class="text-muted">GST (5%)</span>
                    <span>₹<span id="billGst">0</span></span>
                </div>
                <div
                    style="border-top: 1px dashed var(--border); padding-top: 12px; display: flex; justify-content: space-between; font-weight: 700; font-size: 16px;">
                    <span>Total</span>
                    <span class="text-accent">₹<span id="billTotal">0</span></span>
                </div>
            </div>
        </div>

        <div style="padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px;">
            <button class="btn-icon" onclick="clearCart()" style="color: var(--danger); border-color: var(--danger);"><i
                    class="ri-delete-bin-line"></i></button>
            <button class="btn btn-primary" style="flex: 1;" onclick="placeOrder()">
                Place Order • ₹<span id="checkoutTotal">0</span>
            </button>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal modal-center" id="successModal">
        <div style="text-align: center; padding: 40px 24px;">
            <div style="font-size: 64px; margin-bottom: 24px; animation: pulse-ring 2s infinite;">🎉</div>
            <h2 class="font-serif" style="font-size: 28px; margin-bottom: 12px;">Order Placed!</h2>
            <p class="text-muted" id="successMsg" style="margin-bottom: 32px;">Your order is being prepared.</p>

            <div class="card" style="text-align: left; margin-bottom: 32px; padding: 16px;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                    <div style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%;"></div>
                    <span style="font-weight: 600; color: #22c55e; font-size: 14px;">Preparing Now</span>
                </div>
                <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                    <div class="btn-icon" style="background: #22c55e; color: #fff; border: none; font-size: 16px;"><i
                            class="ri-check-line"></i></div>
                    <div>
                        <div style="font-weight: 600; font-size: 14px;">Order Received</div>
                        <div style="font-size: 11px;" class="text-muted">Just now</div>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 12px;">
                <button class="btn btn-secondary" onclick="closeSuccess()" style="flex: 1;">Order More</button>
                <button class="btn btn-primary" onclick="showOrders(); closeSuccess();" style="flex: 1;">View
                    Status</button>
            </div>
        </div>
    </div>

    <!-- Orders Modal -->
    <div class="modal-overlay" id="ordersOverlay" onclick="closeOrders()"></div>
    <div class="modal modal-bottom" id="ordersModal" style="background: var(--bg-dark); height: 80vh;">
        <div
            style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h2 class="font-serif" style="font-size: 20px;">Your Orders</h2>
            <button class="btn-icon" onclick="closeOrders()"><i class="ri-close-line"></i></button>
        </div>
        <div style="padding: 20px; overflow-y: auto; height: 100%;" id="ordersContent"></div>
    </div>

    <script src="data.js"></script>
    <script>
        // Copying the script logic from original file but ensuring it works with new DOM
        let cart = [];
        let currentCat = 'all';
        let currentTable = 5;
        let vegMode = false;        // Logic
        function init() {
            // Theme Check (Immediate)
            const savedTheme = localStorage.getItem('vrs_theme');
            if (savedTheme === 'light') document.body.classList.add('light-mode');
            updateThemeIcon();

            // Query Params
            const params = new URLSearchParams(window.location.search);
            if (params.has('table')) currentTable = parseInt(params.get('table'));
            document.getElementById('tableNum').textContent = currentTable;

            renderCategories();
            renderTrending();
            renderMenu();
            setupSearch();
        }

        function toggleTheme() {
            document.body.classList.add('switching-theme');
            document.body.classList.toggle('light-mode');

            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('vrs_theme', isLight ? 'light' : 'dark');
            updateThemeIcon();

            setTimeout(() => {
                document.body.classList.remove('switching-theme');
            }, 300);
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            const isLight = document.body.classList.contains('light-mode');
            icon.className = isLight ? 'ri-sun-line' : 'ri-moon-line';
        }

        function toggleVeg() {
            vegMode = !vegMode;
            document.getElementById('vegBtn').classList.toggle('active', vegMode);
            renderTrending();
            renderMenu();
            showToast(vegMode ? '🥬 Veg items only' : '🍽️ All items', 'info');
        }

        function renderCategories() {
            document.getElementById('categories').innerHTML = categories.map(cat => `
                <button class="cat-btn ${currentCat === cat.id ? 'active' : ''}" onclick="selectCat('${cat.id}')">
                    <span>${cat.emoji}</span>
                    <span>${cat.name}</span>
                </button>
            `).join('');
        }

        function selectCat(id) {
            currentCat = id;
            renderCategories();
            renderMenu();
            const catName = categories.find(c => c.id === id)?.name || 'All Items';
            document.getElementById('menuTitle').textContent = catName;
            document.getElementById('trendingSection').style.display = id === 'all' ? 'block' : 'none';
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function setupSearch() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderMenu(e.target.value);
                document.getElementById('trendingSection').style.display = e.target.value ? 'none' : 'block';
            });
        }

        function renderTrending() {
            let items = DataStore.getMenuItems().filter(i => i.trending && i.inStock);
            if (vegMode) items = items.filter(i => i.isVeg);

            document.getElementById('trendingList').innerHTML = items.map(item => `
                <div class="trend-card" onclick="addToCart(${item.id})">
                    <div class="trend-img">
                        <img src="${item.image}" alt="${item.name}" loading="lazy">
                        <div class="trend-badge">🔥 Hot</div>
                        <div class="veg-badge ${item.isVeg ? 'veg' : 'nonveg'}" style="position:absolute; bottom:8px; right:8px; top:auto; left:auto; background:white;"></div>
                    </div>
                    <div class="trend-info">
                        <div class="trend-name">${item.emoji} ${item.name}</div>
                        <div class="trend-price">₹${item.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderMenu(search = '') {
            let items = DataStore.getMenuItems().filter(i => i.inStock);
            if (currentCat !== 'all' && currentCat !== 'trending') items = items.filter(i => i.category === currentCat);
            if (vegMode) items = items.filter(i => i.isVeg);
            if (search) {
                const s = search.toLowerCase();
                items = items.filter(i => i.name.toLowerCase().includes(s) || i.description?.toLowerCase().includes(s));
            }

            document.getElementById('menuCount').textContent = `${items.length} items`;
            document.getElementById('emptyState').classList.toggle('hidden', items.length > 0);
            document.getElementById('menuGrid').classList.toggle('hidden', items.length === 0);

            document.getElementById('menuGrid').innerHTML = items.map(item => {
                const inCart = cart.find(c => c.id === item.id);
                const qty = inCart ? inCart.qty : 0;

                return `
                    <div class="card menu-card" style="padding:0;">
                        <div class="menu-card-img" style="position:relative;">
                            <img src="${item.image}" style="width:100%; height:100%; object-fit:cover;" alt="${item.name}">
                            <div class="veg-badge ${item.isVeg ? 'veg' : 'nonveg'}" style="position:absolute; top:12px; left:12px; background:white;"></div>
                        </div>
                        <div class="menu-card-body">
                            <div class="menu-top">
                                <div class="menu-name">${item.emoji} ${item.name}</div>
                            </div>
                            <p class="text-muted" style="font-size:12px; line-height:1.4; margin-bottom:12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                ${item.description || 'Delicious cafe delicacy'}
                            </p>
                            <div class="menu-footer">
                                <div class="menu-price">₹${item.price}</div>
                                ${qty === 0 ? `
                                    <button class="add-btn" onclick="addToCart(${item.id})"><i class="ri-add-line"></i> Add</button>
                                ` : `
                                    <div class="qty-wrap">
                                        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
                                        <span class="qty-val">${qty}</span>
                                        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(id) {
            const item = DataStore.getMenuItems().find(i => i.id === id);
            if (!item) return;
            const existing = cart.find(c => c.id === id);
            if (existing) existing.qty++;
            else cart.push({ ...item, qty: 1 });

            updateCartBar();
            renderMenu(document.getElementById('searchInput').value);
            renderTrending(); // Update trending list to show quantity if needed? No logic for that yet
            showToast(`${item.emoji} ${item.name} added`, 'success');
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function updateQty(id, change) {
            const item = cart.find(c => c.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            }
            updateCartBar();
            renderMenu(document.getElementById('searchInput').value);
            updateCartModal();
        }

        function updateCartBar() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

            document.getElementById('cartBadge').textContent = count;
            document.getElementById('cartItems').textContent = `${count} item${count !== 1 ? 's' : ''}`;
            document.getElementById('cartTotal').textContent = total;
            document.getElementById('cartBar').classList.toggle('hidden', count === 0);
        }

        function openCart() {
            if (cart.length === 0) return showToast('Cart is empty', 'info');
            updateCartModal();
            document.getElementById('overlay').classList.add('show');
            document.getElementById('cartModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeCart() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('cartModal').classList.remove('show');
            document.body.style.overflow = '';
        }

        function updateCartModal() {
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const gst = Math.round(subtotal * 0.05);
            const total = subtotal + gst;

            document.getElementById('billSub').textContent = subtotal.toLocaleString();
            document.getElementById('billGst').textContent = gst.toLocaleString();
            document.getElementById('billTotal').textContent = total.toLocaleString();
            document.getElementById('checkoutTotal').textContent = total.toLocaleString();

            document.getElementById('cartList').innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" class="cart-item-img" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.emoji} ${item.name}</div>
                        <div class="cart-item-price">₹${item.price} each</div>
                    </div>
                    <div class="qty-wrap">
                        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
                        <span class="qty-val">${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function clearCart() {
            cart = [];
            updateCartBar();
            renderMenu();
            closeCart();
            showToast('Cart cleared', 'info');
        }

        function placeOrder() {
            if (cart.length === 0) return;
            const name = document.getElementById('custName').value.trim();
            const notes = document.getElementById('custNotes').value.trim();

            DataStore.createSession(currentTable, cart, name, notes);
            DataStore.addKitchenOrder(currentTable, cart, name, notes);

            closeCart();

            document.getElementById('successMsg').textContent = name
                ? `Thanks ${name}! Your order is being prepared`
                : 'Your order is being prepared';

            document.getElementById('successModal').classList.add('show');
            createConfetti();
            playSound();

            cart = [];
            document.getElementById('custName').value = '';
            document.getElementById('custNotes').value = '';
            updateCartBar();
            renderMenu();
        }

        function closeSuccess() {
            document.getElementById('successModal').classList.remove('show');
        }

        function showOrders() {
            const session = DataStore.getSession(currentTable);
            const content = document.getElementById('ordersContent');
            const overlay = document.getElementById('ordersOverlay');
            const modal = document.getElementById('ordersModal');

            overlay.classList.add('show');
            modal.classList.add('show');

            if (!session || session.items.length === 0) {
                content.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📋</div>
                        <h3>No Orders Yet</h3>
                        <p>Start adding items from the menu</p>
                    </div>
                `;
            } else {
                const subtotal = session.items.reduce((s, i) => s + i.price * i.qty, 0);
                const gst = Math.round(subtotal * 0.05);

                content.innerHTML = `
                    <div class="card" style="margin-bottom: 24px;">
                        <div class="text-accent font-serif" style="font-size: 18px; font-weight: 700;">Table ${session.tableNum}</div>
                        <div class="text-muted" style="font-size: 13px;">${session.customerName || 'Guest'}</div>
                    </div>
                    
                    <h4 class="text-muted" style="font-size: 12px; text-transform: uppercase; margin-bottom: 12px;">Items Ordered</h4>
                    ${session.items.map(item => `
                        <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                            <div>
                                <div style="font-weight: 600;">${item.qty}x ${item.name}</div>
                                <div class="text-muted" style="font-size: 12px;">₹${item.price}</div>
                            </div>
                            <div style="font-weight: 600;">₹${item.price * item.qty}</div>
                        </div>
                    `).join('')}
                    
                    <div style="margin-top: 24px;">
                         <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span class="text-muted">Subtotal</span>
                            <span>₹${subtotal}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <span class="text-muted">GST (5%)</span>
                            <span>₹${gst}</span>
                        </div>
                        <div style="border-top: 1px dashed var(--border); padding-top: 12px; display: flex; justify-content: space-between; font-weight: 700; font-size: 18px;">
                            <span>Total</span>
                            <span class="text-accent">₹${subtotal + gst}</span>
                        </div>
                    </div>
                `;
            }
        }

        function closeOrders() {
            document.getElementById('ordersOverlay').classList.remove('show');
            document.getElementById('ordersModal').classList.remove('show');
        }

        // Init
        init();
    </script>
</body>

</html>
