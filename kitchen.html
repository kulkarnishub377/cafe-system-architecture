<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title># 91 VRS Cafe | Kitchen</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
    
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-orange-400 to-red-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/30">
                    <i class="ri-fire-fill text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="heading text-lg font-bold">Kitchen Display</h1>
                    <p class="text-secondary text-sm flex items-center gap-2">
                        # 91 VRS Cafe
                        <span class="flex items-center gap-1.5 text-emerald-400">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span class="relative rounded-full h-2 w-2 bg-emerald-500"></span>
                            </span>
                            Live
                        </span>
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="btn-icon">
                    <i id="themeIcon" class="ri-moon-line text-xl"></i>
                </button>
                <button onclick="toggleSound()" id="soundBtn" class="btn-icon">
                    <i id="soundIcon" class="ri-volume-up-line text-xl"></i>
                </button>
                <button onclick="toggleStockPanel()" class="btn btn-secondary px-4 py-2.5 text-sm bg-orange-500/10 border-orange-500/30 text-orange-400">
                    <i class="ri-archive-line"></i>
                    86 Mode
                </button>
                <a href="index.html" class="btn-icon">
                    <i class="ri-home-4-line text-xl"></i>
                </a>
            </div>
        </div>
    </header>
    
    <!-- Stats Bar -->
    <div class="section grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="card">
            <div class="flex items-center justify-between mb-2">
                <span class="text-2xl">⏳</span>
                <span class="text-muted text-xs font-medium">Pending</span>
            </div>
            <p id="statPending" class="heading text-3xl font-bold text-orange-400">0</p>
        </div>
        <div class="card">
            <div class="flex items-center justify-between mb-2">
                <span class="text-2xl">🔥</span>
                <span class="text-muted text-xs font-medium">Cooking</span>
            </div>
            <p id="statCooking" class="heading text-3xl font-bold text-amber-400">0</p>
        </div>
        <div class="card">
            <div class="flex items-center justify-between mb-2">
                <span class="text-2xl">✅</span>
                <span class="text-muted text-xs font-medium">Done</span>
            </div>
            <p id="statDone" class="heading text-3xl font-bold text-emerald-400">0</p>
        </div>
        <div class="card">
            <div class="flex items-center justify-between mb-2">
                <span class="text-2xl">⏱️</span>
                <span class="text-muted text-xs font-medium">Avg Time</span>
            </div>
            <p id="statAvgTime" class="heading text-3xl font-bold text-blue-400">0m</p>
        </div>
    </div>
    
    <!-- Orders Grid -->
    <div class="section pt-0">
        <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="text-7xl mb-6">🍳</div>
            <h2 class="heading text-2xl font-bold mb-3">All Caught Up!</h2>
            <p class="text-muted">New orders will appear here automatically</p>
        </div>
    </div>
    
    <!-- Stock Panel (86 Mode) -->
    <div id="stockPanel" class="hidden fixed inset-0 z-50 overflow-auto" style="background: var(--bg-primary);">
        <header class="header">
            <div class="header-content">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-orange-400 to-red-500 rounded-xl flex items-center justify-center font-bold text-xl text-white">
                        86
                    </div>
                    <div>
                        <h2 class="heading text-lg font-bold">Stock Control</h2>
                        <p class="text-muted text-sm">Toggle item availability</p>
                    </div>
                </div>
                <button onclick="toggleStockPanel()" class="btn-icon">
                    <i class="ri-close-line text-xl"></i>
                </button>
            </div>
        </header>
        
        <div class="px-6 py-4 overflow-x-auto no-scrollbar border-b" style="border-color: var(--border-color);">
            <div id="stockCategories" class="flex gap-3"></div>
        </div>
        
        <div id="stockGrid" class="section grid-2 md:grid-3 lg:grid-4"></div>
    </div>
    
    <script src="data.js"></script>
    <script>
        let soundEnabled = true;
        let stockCategory = 'all';
        let lastOrderCount = 0;
        
        function init() {
            renderOrders();
            updateStats();
            updateThemeUI(ThemeManager.get());
            
            // Auto-refresh every 3 seconds
            setInterval(() => {
                const orders = DataStore.getKitchenOrders().filter(o => o.status !== 'completed');
                if (orders.length > lastOrderCount && soundEnabled) {
                    playSound();
                    showToast('🔔 New order received!', 'warning');
                }
                lastOrderCount = orders.length;
                renderOrders();
                updateStats();
            }, 3000);
        }
        
        function toggleTheme() {
            const theme = ThemeManager.toggle();
            updateThemeUI(theme);
        }
        
        function updateThemeUI(theme) {
            const icon = document.getElementById('themeIcon');
            icon.className = theme === 'dark' ? 'ri-moon-line text-xl' : 'ri-sun-line text-xl';
        }
        
        function renderOrders() {
            const orders = DataStore.getKitchenOrders()
                .filter(o => o.status !== 'completed')
                .sort((a, b) => new Date(a.time) - new Date(b.time));
            
            const grid = document.getElementById('ordersGrid');
            const empty = document.getElementById('emptyState');
            
            if (orders.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            
            grid.innerHTML = orders.map(order => {
                const elapsed = getElapsedMinutes(order.time);
                let borderClass = 'border-emerald-500/50';
                let timeClass = 'badge-success';
                let urgent = '';
                
                if (elapsed > 15) {
                    borderClass = 'border-red-500';
                    timeClass = 'badge-danger';
                    urgent = 'animate-urgent';
                } else if (elapsed > 8) {
                    borderClass = 'border-amber-500';
                    timeClass = 'badge-warning';
                }
                
                return `
                    <div class="card card-lg border-2 ${borderClass} ${urgent}">
                        <!-- Header -->
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center text-xl font-bold text-white shadow-lg shadow-emerald-500/30">
                                    ${order.tableNum}
                                </div>
                                <div>
                                    <p class="heading font-bold">Table ${order.tableNum}</p>
                                    <p class="text-muted text-sm">${formatTime(order.time)}</p>
                                </div>
                            </div>
                            <span class="badge ${timeClass}">
                                <i class="ri-time-line mr-1"></i>${elapsed}m
                            </span>
                        </div>
                        
                        ${order.customerName ? `
                        <div class="card-sm mb-4 flex items-center gap-3">
                            <i class="ri-user-smile-line text-emerald-400"></i>
                            <span class="font-semibold">${order.customerName}</span>
                        </div>
                        ` : ''}
                        
                        ${order.specialInstructions ? `
                        <div class="card-sm mb-4 bg-amber-500/10 border-amber-500/30">
                            <p class="text-amber-400 text-xs font-bold mb-1 flex items-center gap-1">
                                <i class="ri-alert-line"></i> SPECIAL REQUEST
                            </p>
                            <p class="text-amber-100 text-sm">${order.specialInstructions}</p>
                        </div>
                        ` : ''}
                        
                        <!-- Items -->
                        <div class="space-y-2 mb-4">
                            ${order.items.map(item => `
                                <div class="card-sm flex items-center justify-between">
                                    <div class="flex items-center gap-3">
                                        <div class="${item.isVeg ? 'veg-badge' : 'nonveg-badge'}" style="width:14px;height:14px"></div>
                                        <span class="text-lg">${item.emoji}</span>
                                        <span class="font-medium text-sm">${item.name}</span>
                                    </div>
                                    <span class="bg-emerald-500 text-white px-3 py-1 rounded-full text-sm font-bold">×${item.qty}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <!-- Actions -->
                        ${order.status === 'pending' ? `
                            <button onclick="startCooking(${order.id})" class="w-full btn py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white shadow-lg shadow-orange-500/30">
                                <i class="ri-fire-fill"></i> Start Cooking
                            </button>
                        ` : `
                            <div class="text-center text-amber-400 font-medium mb-3 flex items-center justify-center gap-2 text-sm">
                                <i class="ri-loader-4-line animate-spin"></i> Cooking in progress...
                            </div>
                            <button onclick="markDone(${order.id})" class="w-full btn btn-primary py-3">
                                <i class="ri-check-double-line"></i> Mark Done
                            </button>
                        `}
                    </div>
                `;
            }).join('');
        }
        
        function startCooking(orderId) {
            DataStore.updateOrderStatus(orderId, 'preparing');
            renderOrders();
            updateStats();
            showToast('🔥 Cooking started!', 'warning');
            if (navigator.vibrate) navigator.vibrate(50);
        }
        
        function markDone(orderId) {
            const order = DataStore.updateOrderStatus(orderId, 'completed');
            renderOrders();
            updateStats();
            showToast(`✅ Table ${order?.tableNum} ready to serve!`, 'success');
            if (navigator.vibrate) navigator.vibrate(50);
            playSound();
        }
        
        function updateStats() {
            const orders = DataStore.getKitchenOrders();
            const pending = orders.filter(o => o.status === 'pending').length;
            const cooking = orders.filter(o => o.status === 'preparing').length;
            const done = orders.filter(o => o.status === 'completed').length;
            
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statCooking').textContent = cooking;
            document.getElementById('statDone').textContent = done;
            
            // Calculate average time
            const completed = orders.filter(o => o.completedTime);
            if (completed.length > 0) {
                const totalTime = completed.reduce((sum, o) => {
                    return sum + Math.floor((new Date(o.completedTime) - new Date(o.time)) / 60000);
                }, 0);
                document.getElementById('statAvgTime').textContent = Math.round(totalTime / completed.length) + 'm';
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('soundIcon');
            if (soundEnabled) {
                icon.className = 'ri-volume-up-line text-xl';
            } else {
                icon.className = 'ri-volume-mute-line text-xl text-muted';
            }
            showToast(soundEnabled ? '🔊 Sound enabled' : '🔇 Sound muted', 'info');
        }
        
        function toggleStockPanel() {
            const panel = document.getElementById('stockPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                renderStockCategories();
                renderStockGrid();
            }
            document.body.style.overflow = panel.classList.contains('hidden') ? '' : 'hidden';
        }
        
        function renderStockCategories() {
            document.getElementById('stockCategories').innerHTML = categories.filter(c => c.id !== 'trending').map(cat => `
                <button onclick="filterStock('${cat.id}')" class="flex items-center gap-2 px-4 py-2.5 rounded-full whitespace-nowrap font-medium transition-all ${
                    stockCategory === cat.id 
                        ? 'bg-emerald-500 text-white shadow-lg' 
                        : 'card'
                }">
                    <span>${cat.emoji}</span>
                    <span>${cat.name}</span>
                </button>
            `).join('');
        }
        
        function filterStock(catId) {
            stockCategory = catId;
            renderStockCategories();
            renderStockGrid();
        }
        
        function renderStockGrid() {
            let items = DataStore.getMenuItems();
            if (stockCategory !== 'all') {
                items = items.filter(i => i.category === stockCategory);
            }
            
            document.getElementById('stockGrid').innerHTML = items.map(item => `
                <div class="card ${!item.inStock ? 'opacity-50' : ''}">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="${item.image}" alt="${item.name}" class="w-14 h-14 rounded-xl object-cover flex-shrink-0">
                        <div class="flex-1 min-w-0">
                            <p class="heading font-bold text-sm truncate">${item.emoji} ${item.name}</p>
                            <p class="text-muted text-sm">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium ${item.inStock ? 'text-emerald-400' : 'text-red-400'}">
                            ${item.inStock ? '✓ In Stock' : '✕ Out'}
                        </span>
                        <button onclick="toggleStock(${item.id})" class="toggle ${item.inStock ? 'active' : ''}"></button>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleStock(itemId) {
            DataStore.toggleStock(itemId);
            renderStockGrid();
            const item = DataStore.getMenuItems().find(i => i.id === itemId);
            showToast(item.inStock ? `✅ ${item.name} available` : `❌ ${item.name} out of stock`, item.inStock ? 'success' : 'warning');
        }
        
        init();
    </script>
</body>
</html>
