<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display - # SK cafe</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .order-card {
            border-top: 4px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .order-card.new {
            border-top-color: var(--success);
            animation: pulse-border 2s infinite;
        }

        .order-card.cooking {
            border-top-color: var(--warning);
        }

        .order-card.late {
            border-top-color: var(--danger);
        }

        @keyframes pulse-border {
            0% {
                border-top-color: var(--success);
            }

            50% {
                border-top-color: transparent;
            }

            100% {
                border-top-color: var(--success);
            }
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .order-time {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .order-items {
            flex: 1;
            margin-bottom: 16px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 15px;
        }

        .stock-panel {
            position: fixed;
            right: 0;
            top: 80px;
            bottom: 0;
            width: 300px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--border);
            padding: 24px;
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 100;
        }

        .stock-panel.open {
            transform: translateX(0);
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="grain"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:12px;">
                <div class="logo-icon">🔥</div>
                <div class="logo-text">KDS <span
                        style="font-size: 14px; opacity: 0.6; font-family: 'Inter', sans-serif;">System</span></div>
            </a>
        </div>

        <div class="header-actions" style="display:flex; align-items:center; gap:12px;">
            <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">
                <i class="ri-moon-line" id="themeIcon"></i>
            </button>
            <button class="btn-icon" onclick="toggleSound()" id="soundBtn">
                <i class="ri-volume-up-line"></i>
            </button>

            <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px;"></div>

            <button class="btn btn-secondary" onclick="toggleStockPanel()" style="padding: 10px 16px; font-size: 13px;">
                <i class="ri-forbid-2-line"></i> <span class="hidden-mobile">86 Mode</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container" style="padding-top: 100px; max-width: 100%;">

        <!-- Stats -->
        <div class="stats-bar"
            style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px;">
            <div class="card stat-card">
                <div class="stat-value text-warning" id="statPending">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value text-accent" id="statCooking">0</div>
                <div class="stat-label">Cooking</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value text-success" id="statDone">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="statAvgTime">0m</div>
                <div class="stat-label">Avg Time</div>
            </div>
        </div>

        <!-- Orders Grid -->
        <div class="order-grid" id="ordersGrid">
            <!-- Rendered by JS -->
        </div>

        <div id="emptyState" class="hidden" style="text-align: center; padding: 60px; opacity: 0.5;">
            <div style="font-size: 64px; margin-bottom: 20px;">👨‍🍳</div>
            <h2 class="font-serif">All caught up!</h2>
            <p>Waiting for new orders...</p>
        </div>

    </main>

    <!-- Stock Panel (86 Mode) -->
    <aside class="stock-panel" id="stockPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 class="font-serif" style="font-size: 20px;">Item Availability</h2>
            <button class="btn-icon" onclick="toggleStockPanel()"><i class="ri-close-line"></i></button>
        </div>
        <div class="input" style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
            <i class="ri-search-line"></i>
            <input type="text" placeholder="Search items..."
                style="background: transparent; border: none; color: inherit; width: 100%; outline: none;"
                oninput="renderStockGrid(this.value)">
        </div>
        <div id="stockGrid"
            style="display: flex; flex-direction: column; gap: 12px; overflow-y: auto; height: calc(100% - 100px);">
            <!-- Rendered by JS -->
        </div>
    </aside>

    <script src="data.js"></script>
    <script>
        let soundEnabled = true;

        async function init() {
            // Theme Check (Immediate)
            const savedTheme = localStorage.getItem('sk_theme');
            if (savedTheme === 'light') document.body.classList.add('light-mode');

            await renderOrders();
            await renderStockGrid();
            await updateStats();

            setInterval(async () => {
                await renderOrders();
                await updateStats();
            }, 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('sk_theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isLight = document.body.classList.contains('light-mode');
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = isLight ? 'ri-sun-line' : 'ri-moon-line';
        }

        async function updateStats() {
            try {
                const orders = await DataStore.getKitchenOrders();
                const pending = orders.filter(o => o.status === 'pending').length;
                const cooking = orders.filter(o => o.status === 'preparing').length;
                const completed = orders.filter(o => o.status === 'completed');
                const done = completed.length;

                let avgTime = 0;
                if (completed.length > 0) {
                    const totalMinutes = completed.reduce((sum, o) => {
                        if (o.completed_at) {
                            const start = new Date(o.created_at).getTime();
                            const end = new Date(o.completed_at).getTime();
                            return sum + Math.floor((end - start) / 60000);
                        }
                        return sum;
                    }, 0);
                    avgTime = Math.round(totalMinutes / completed.length);
                }

                document.getElementById('statPending').textContent = pending;
                document.getElementById('statCooking').textContent = cooking;
                document.getElementById('statDone').textContent = done;
                document.getElementById('statAvgTime').textContent = avgTime + 'm';
            } catch (e) { /* ignore polling errors */ }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').innerHTML = soundEnabled ? '<i class="ri-volume-up-line"></i>' : '<i class="ri-volume-mute-line"></i>';
            document.getElementById('soundBtn').classList.toggle('text-muted', !soundEnabled);
        }

        async function renderOrders() {
            try {
                const orders = (await DataStore.getKitchenOrders())
                    .filter(o => o.status !== 'completed')
                    .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                const grid = document.getElementById('ordersGrid');
                const empty = document.getElementById('emptyState');

                if (orders.length === 0) {
                    grid.innerHTML = '';
                    empty.classList.remove('hidden');
                    return;
                }

                empty.classList.add('hidden');

                grid.innerHTML = orders.map(order => {
                    const elapsed = getElapsedMinutes(order.created_at);
                    let statusClass = 'new';
                    if (order.status === 'preparing') statusClass = 'cooking';
                    if (elapsed > 15) statusClass = 'late';

                    return `
                        <div class="card order-card ${statusClass}">
                            <div class="order-header">
                                <div>
                                    <h3 class="font-serif" style="font-size: 18px;">Table ${order.table_num}</h3>
                                    <div class="order-time">${formatTime(order.created_at)} (${elapsed}m ago)</div>
                                </div>
                                <div class="badge ${order.status === 'pending' ? 'badge-warning' : 'badge-danger'}">
                                    ${order.status.toUpperCase()}
                                </div>
                            </div>
                            
                            <div class="order-items">
                                ${order.items.map(item => `
                                    <div class="order-item">
                                        <span style="font-weight: 600;">${item.qty}x ${item.name}</span>
                                        ${item.qty > 1 ? `<span class="text-muted" style="font-size: 12px;">(₹${item.price})</span>` : ''}
                                    </div>
                                `).join('')}
                                
                                ${order.special_instructions ? `
                                    <div style="margin-top: 12px; padding: 8px; background: rgba(245, 158, 11, 0.1); border: 1px dashed #f59e0b; border-radius: 8px; font-size: 13px; color: #f59e0b;">
                                        <strong>Note:</strong> ${order.special_instructions}
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div style="margin-top: auto; display: flex; gap: 12px;">
                                ${order.status === 'pending' ? `
                                    <button onclick="startCooking(${order.id})" class="btn btn-primary" style="width: 100%;">
                                        <i class="ri-fire-line"></i> Start Cooking
                                    </button>
                                ` : `
                                    <button onclick="markDone(${order.id})" class="btn btn-success" style="width: 100%; background: #22c55e; color: #fff; border:none;">
                                        <i class="ri-check-line"></i> Mark Done
                                    </button>
                                `}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { /* ignore polling errors */ }
        }

        async function startCooking(id) {
            try {
                await DataStore.updateOrderStatus(id, 'preparing');
                await renderOrders();
                playNotification();
            } catch (e) {
                showToast('Failed to update status', 'error');
            }
        }

        async function markDone(id) {
            try {
                await DataStore.updateOrderStatus(id, 'completed');
                await renderOrders();
                playNotification();
            } catch (e) {
                showToast('Failed to update status', 'error');
            }
        }

        function playNotification() {
            if (soundEnabled) playSound();
        }

        // Stock Panel
        function toggleStockPanel() {
            document.getElementById('stockPanel').classList.toggle('open');
        }

        async function renderStockGrid(search = '') {
            try {
                let items = await DataStore.getMenuItems();
                if (search) items = items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));

                document.getElementById('stockGrid').innerHTML = items.map(item => `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span>${item.emoji}</span>
                            <span style="${!item.in_stock ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${item.name}</span>
                        </div>
                        <label class="switch" style="position: relative; display: inline-block; width: 40px; height: 20px;">
                            <input type="checkbox" ${item.in_stock ? 'checked' : ''} onchange="toggleStock(${item.id})" style="opacity: 0; width: 0; height: 0;">
                            <span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px;"></span>
                            <span style="position: absolute; content: ''; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; transform: ${item.in_stock ? 'translateX(20px)' : 'translateX(0)'}; background-color: ${item.in_stock ? '#22c55e' : '#fff'};"></span>
                        </label>
                    </div>
                `).join('');
            } catch (e) { /* ignore */ }
        }

        async function toggleStock(id) {
            try {
                await DataStore.toggleStock(id);
                await renderStockGrid();
            } catch (e) {
                showToast('Failed to toggle stock', 'error');
            }
        }

        init();
    </script>
</body>

</html>
