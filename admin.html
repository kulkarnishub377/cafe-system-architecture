<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager - # 91 VRS Cafe</title>
    <!-- Tailwind removed, using custom design system -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Admin Specific Overrides */
        .sidebar {
            width: 320px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--border);
            position: fixed;
            right: 0;
            top: 80px;
            bottom: 0;
            padding: 24px;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 90;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        @media (max-width: 1024px) {
            .sidebar {
                border-left: none;
                background: var(--bg-dark);
                width: 100%;
                z-index: 200;
                top: 0;
            }
        }

        .map-section {
            margin-right: 0;
            transition: margin-right 0.3s;
            padding: 24px;
        }

        .map-section.sidebar-open {
            margin-right: 320px;
        }

        @media (max-width: 1024px) {
            .map-section.sidebar-open {
                margin-right: 0;
            }
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="grain"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:12px;">
                <div class="logo-icon">☕</div>
                <div class="logo-text"># 91 VRS <span
                        style="font-size: 14px; opacity: 0.6; font-family: 'Inter', sans-serif;">Manager</span></div>
            </a>
        </div>

        <div class="header-actions" style="display:flex; align-items:center; gap:12px;">
            <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">
                <i class="ri-moon-line" id="themeIcon"></i>
            </button>
            <button class="btn-icon" onclick="toggleSound()" id="soundBtn">
                <i class="ri-volume-up-line"></i>
            </button>

            <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px;"></div>

            <button class="btn btn-secondary" onclick="showMenuManager()" style="padding: 10px 16px; font-size: 13px;">
                <i class="ri-restaurant-2-line"></i> <span class="hidden-mobile">Menu</span>
            </button>
            <button class="btn btn-secondary" onclick="showReports()" style="padding: 10px 16px; font-size: 13px;">
                <i class="ri-bar-chart-line"></i> <span class="hidden-mobile">Reports</span>
            </button>
            <button class="btn-icon" onclick="showSettings()">
                <i class="ri-settings-4-line"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container" style="padding-top: 100px; max-width: 100%;">

        <!-- Stats -->
        <div class="stats-bar">
            <div class="card stat-card">
                <div class="stat-value" id="statRevenue">₹0</div>
                <div class="stat-label">Today's Revenue</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="statOrders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="statActive">0</div>
                <div class="stat-label">Active Tables</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="statAvg">₹0</div>
                <div class="stat-label">Avg Order Value</div>
            </div>
        </div>

        <div style="display: flex; gap: 24px; flex-wrap: wrap;">
            <!-- Floor Map -->
            <div style="flex: 2; min-width: 300px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 class="font-serif" style="font-size: 24px;">Floor Plan</h2>
                    <div style="display: flex; gap: 16px; font-size: 13px;">
                        <span style="display:flex; align-items:center; gap:6px;"><span
                                style="width:8px; height:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:50%;"></span>
                            Free</span>
                        <span style="display:flex; align-items:center; gap:6px;"><span
                                style="width:8px; height:8px; background:rgba(239, 68, 68, 0.2); border:1px solid #ef4444; border-radius:50%;"></span>
                            Occupied</span>
                        <span style="display:flex; align-items:center; gap:6px;"><span
                                style="width:8px; height:8px; background:rgba(245, 158, 11, 0.2); border:1px solid #f59e0b; border-radius:50%;"></span>
                            Billed</span>
                    </div>
                </div>

                <div class="table-grid" id="floorMap">
                    <!-- Tables rendered by JS -->
                </div>
            </div>

            <!-- Live Activity -->
            <div style="flex: 1; min-width: 300px;">
                <div class="card" style="height: 100%; min-height: 400px; display: flex; flex-direction: column;">
                    <div style="margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
                        <h3 class="font-serif" style="font-size: 18px;">Live Activity</h3>
                    </div>
                    <div id="activityFeed"
                        style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;">
                        <!-- Feed items -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Table Sidebar -->
    <aside class="sidebar" id="tableSidebar">
        <!-- Rendered by JS -->
    </aside>

    <!-- Menu Manager Modal -->
    <div class="modal-overlay" id="menuOverlay" onclick="hideMenuManager()"></div>
    <div class="modal modal-center" id="menuModal"
        style="max-width: 800px; height: 80vh; display: flex; flex-direction: column;">
        <div
            style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h2 class="font-serif" style="font-size: 20px;">Menu Manager</h2>
            <button class="btn-icon" onclick="hideMenuManager()"><i class="ri-close-line"></i></button>
        </div>

        <div style="padding: 20px; overflow-y: auto; flex: 1;">
            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="showAddItem()"><i class="ri-add-line"></i> Add Item</button>
                <input type="text" class="input" placeholder="Search menu..." id="menuSearch"
                    oninput="renderMenuTable(this.value)">
            </div>

            <div id="menuTableContainer">
                <!-- Table rendered by JS -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsOverlay" onclick="hideSettings()"></div>
    <div class="modal modal-center" id="settingsModal">
        <div
            style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h2 class="font-serif" style="font-size: 20px;">Cafe Settings</h2>
            <button class="btn-icon" onclick="hideSettings()"><i class="ri-close-line"></i></button>
        </div>
        <div style="padding: 24px;">
            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;">Cafe
                    Name</label>
                <input type="text" class="input" id="settingName">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label
                        style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;">Tax
                        Rate (%)</label>
                    <input type="number" class="input" id="settingTax">
                </div>
                <div>
                    <label
                        style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;">Total
                        Tables</label>
                    <input type="number" class="input" id="settingTables">
                </div>
            </div>
            <div style="margin-bottom: 32px;">
                <label
                    style="display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;">Data
                    Management</label>
                <button class="btn btn-secondary" onclick="clearAllData()"
                    style="width: 100%; color: var(--danger); border-color: rgba(239, 68, 68, 0.3);">
                    <i class="ri-delete-bin-line"></i> Reset All Data
                </button>
            </div>

            <button class="btn btn-primary" style="width: 100%;" onclick="saveSettings()">Save Changes</button>
        </div>
    </div>

    <!-- Add/Edit Item Modal (Nested) -->
    <div class="modal modal-center" id="itemModal" style="z-index: 205; max-width: 400px;">
        <div
            style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h2 class="font-serif" style="font-size: 18px;" id="itemModalTitle">Add Item</h2>
            <button class="btn-icon" onclick="hideItemModal()"><i class="ri-close-line"></i></button>
        </div>
        <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px;">
            <input type="hidden" id="itemId">
            <input type="text" class="input" id="itemName" placeholder="Item Name">
            <input type="text" class="input" id="itemEmoji" placeholder="Emoji (e.g. ☕)">
            <input type="number" class="input" id="itemPrice" placeholder="Price (₹)">
            <select class="input" id="itemCat">
                <option value="coffee">Coffee</option>
                <option value="food">Food</option>
                <option value="dessert">Dessert</option>
                <option value="drinks">Drinks</option>
            </select>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="itemVeg"> <label for="itemVeg">Is Vegetarian?</label>
            </div>
            <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
        </div>
    </div>

    <!-- Hidden Print Area -->
    <div id="printArea" style="display: none;"></div>

    <script src="data.js"></script>
    <script>
        let selectedTable = null;
        let soundEnabled = true;

        function init() {
            // Theme Check (Immediate)
            const savedTheme = localStorage.getItem('vrs_theme');
            if (savedTheme === 'light') document.body.classList.add('light-mode');

            renderFloorMap();
            updateStats();
            renderActivityFeed();

            // Auto refresh
            setInterval(() => {
                renderFloorMap();
                updateStats();
            }, 5000);
        }

        // --- Core Functions ---
        function toggleTheme() {
            document.body.classList.add('switching-theme');
            document.body.classList.toggle('light-mode');

            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('vrs_theme', isLight ? 'light' : 'dark');

            setTimeout(() => {
                document.body.classList.remove('switching-theme');
            }, 300);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').innerHTML = soundEnabled ? '<i class="ri-volume-up-line"></i>' : '<i class="ri-volume-mute-line"></i>';
            document.getElementById('soundBtn').classList.toggle('text-muted', !soundEnabled);
        }

        // --- Dashboard Renderers ---
        function renderFloorMap() {
            const sessions = DataStore.getSessions();
            const settings = DataStore.getSettings();
            const total = settings.totalTables || 12;

            const grid = document.getElementById('floorMap');
            grid.innerHTML = '';

            for (let i = 1; i <= total; i++) {
                const session = sessions[i];
                const card = document.createElement('div');
                card.className = `table-card ${session ? (session.billPrinted ? 'billed' : 'occupied') : ''}`;
                card.onclick = () => openTable(i);

                let icon = session ? (session.billPrinted ? 'ri-bill-line' : 'ri-user-smile-line') : 'ri-checkbox-blank-circle-line';
                let status = session ? (session.billPrinted ? 'Billed' : 'Occupied') : 'Available';

                card.innerHTML = `
                    <i class="${icon}" style="font-size: 24px; margin-bottom: 8px; opacity: 0.8;"></i>
                    <div style="font-weight: 700; font-size: 16px;">T ${i}</div>
                    <div style="font-size: 11px; text-transform: uppercase; margin-top: 4px; opacity: 0.7;">${status}</div>
                `;
                grid.appendChild(card);
            }
        }

        function updateStats() {
            const stats = DataStore.getTodayStats();
            document.getElementById('statRevenue').textContent = '₹' + stats.revenue.toLocaleString();
            document.getElementById('statOrders').textContent = stats.orders;
            document.getElementById('statActive').textContent = stats.activeTables;
            document.getElementById('statAvg').textContent = '₹' + stats.avgOrder;
        }

        function renderActivityFeed() {
            const history = DataStore.getSalesHistory().slice(0, 10);
            const feed = document.getElementById('activityFeed');

            if (history.length === 0) {
                feed.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted);">No activity today</div>';
                return;
            }

            feed.innerHTML = history.reverse().map(sale => `
                <div style="padding: 12px; background: var(--bg-card); border-radius: 12px; font-size: 13px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                        <span style="font-weight: 600;">Table ${sale.tableNum}</span>
                        <span class="text-accent font-bold">₹${sale.total}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; color: var(--text-muted);">
                        <span>${formatTime(sale.closedTime)}</span>
                        <span>${sale.items.length} items</span>
                    </div>
                </div>
            `).join('');
        }

        // --- Sidebar Logic ---
        function openTable(num) {
            selectedTable = num;
            const sidebar = document.getElementById('tableSidebar');
            sidebar.classList.add('open');
            document.querySelector('.map-section').classList.add('sidebar-open');
            renderSidebar();
        }

        function closeSidebar() {
            selectedTable = null;
            const sidebar = document.getElementById('tableSidebar');
            sidebar.classList.remove('open');
            document.querySelector('.map-section').classList.remove('sidebar-open');
        }

        function renderSidebar() {
            const container = document.getElementById('tableSidebar');
            if (!selectedTable) return;

            const session = DataStore.getSession(selectedTable);

            if (!session) {
                container.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h2 class="font-serif" style="font-size: 24px;">Table ${selectedTable}</h2>
                        <button class="btn-icon" onclick="closeSidebar()"><i class="ri-close-line"></i></button>
                    </div>
                    <div style="text-align: center; padding: 40px 0; opacity: 0.5;">
                        <i class="ri-armchair-line" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>
                        <p>Table is currently empty</p>
                    </div>
                `;
                return;
            }

            const subtotal = session.items.reduce((s, i) => s + i.price * i.qty, 0);
            const gst = Math.round(subtotal * 0.05);

            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div>
                        <h2 class="font-serif" style="font-size: 24px;">Table ${selectedTable}</h2>
                        <div class="text-muted" style="font-size: 13px;">${session.customerName || 'Guest'}</div>
                    </div>
                    <button class="btn-icon" onclick="closeSidebar()"><i class="ri-close-line"></i></button>
                </div>
                
                <div style="flex: 1; overflow-y: auto; margin-bottom: 24px;">
                    ${session.items.map(item => `
                        <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                            <div>
                                <div style="font-weight: 600;">${item.qty}x ${item.name}</div>
                                <div class="text-muted" style="font-size: 12px;">₹${item.price}</div>
                            </div>
                            <div style="font-weight: 600;">₹${item.price * item.qty}</div>
                        </div>
                    `).join('')}
                    
                    <div style="margin-top: 20px; font-size: 14px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span class="text-muted">Subtotal</span>
                            <span>₹${subtotal}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <span class="text-muted">GST (5%)</span>
                            <span>₹${gst}</span>
                        </div>
                        <div style="border-top: 1px dashed var(--border); padding-top: 12px; display: flex; justify-content: space-between; font-weight: 700; font-size: 18px;">
                            <span>Total</span>
                            <span class="text-accent">₹${subtotal + gst}</span>
                        </div>
                    </div>
                </div>
                
                <div style="display: grid; gap: 12px;">
                    ${!session.billPrinted ? `
                        <button onclick="printBill(${selectedTable})" class="btn btn-secondary w-full"><i class="ri-printer-line"></i> Print Bill</button>
                    ` : `
                        <div class="badge badge-warning" style="text-align: center; padding: 12px;">Bill Printed</div>
                    `}
                    <button onclick="settleTable(${selectedTable})" class="btn btn-primary w-full">Settle & Close</button>
                </div>
            `;
        }

        // --- Actions ---
        function printBill(tableNum) {
            DataStore.markBillPrinted(tableNum);

            // Mock Print Logic
            const session = DataStore.getSession(tableNum);
            const printContent = `
                <div style="text-align: center; font-family: monospace; padding: 20px;">
                    <h2># 91 VRS Cafe</h2>
                    <p>Table ${tableNum} • ${new Date().toLocaleString()}</p>
                    <hr>
                    ${session.items.map(i => `<div>${i.qty} x ${i.name} - ${i.price * i.qty}</div>`).join('')}
                    <hr>
                    <h3>Total: ₹${session.items.reduce((s, i) => s + i.price * i.qty, 0)}</h3>
                </div>
            `;

            const printWindow = window.open('', '', 'width=400,height=600');
            printWindow.document.write(printContent);
            printWindow.print();
            printWindow.close();

            renderFloorMap();
            renderSidebar();
        }

        function settleTable(tableNum) {
            if (confirm(`Settle bill for Table ${tableNum}?`)) {
                DataStore.closeSession(tableNum);
                closeSidebar();
                renderFloorMap();
                updateStats();
                showToast('Table settled successfully', 'success');
            }
        }

        function clearAllData() {
            if (confirm('Are you sure? This will wipe all data.')) {
                DataStore.clearAll();
                window.location.reload();
            }
        }

        // --- Menu Manager ---
        function showMenuManager() {
            document.getElementById('menuOverlay').classList.add('show');
            document.getElementById('menuModal').classList.add('show');
            renderMenuTable();
        }

        function hideMenuManager() {
            document.getElementById('menuOverlay').classList.remove('show');
            document.getElementById('menuModal').classList.remove('show');
        }

        function renderMenuTable(search = '') {
            let items = DataStore.getMenuItems();
            if (search) items = items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));

            const container = document.getElementById('menuTableContainer');
            if (items.length === 0) {
                container.innerHTML = '<p class="text-muted text-center p-4">No items found</p>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px;">
                     <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 24px;">${item.emoji}</span>
                        <div>
                            <div style="font-weight: 600;">${item.name}</div>
                            <div class="text-muted" style="font-size: 12px;">₹${item.price} • ${item.category}</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-icon" style="width: 32px; height: 32px;" onclick="editItem(${item.id})"><i class="ri-edit-line"></i></button>
                        <button class="btn-icon" style="width: 32px; height: 32px; color: var(--danger); border-color: rgba(239, 68, 68, 0.3);" onclick="deleteItem(${item.id})"><i class="ri-delete-bin-line"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // --- Settings ---
        function showSettings() {
            const s = DataStore.getSettings();
            document.getElementById('settingName').value = s.cafeName;
            document.getElementById('settingTax').value = s.taxRate;
            document.getElementById('settingTables').value = s.totalTables;
            document.getElementById('settingsOverlay').classList.add('show');
            document.getElementById('settingsModal').classList.add('show');
        }

        function hideSettings() {
            document.getElementById('settingsOverlay').classList.remove('show');
            document.getElementById('settingsModal').classList.remove('show');
        }

        function saveSettings() {
            DataStore.saveSettings({
                cafeName: document.getElementById('settingName').value,
                taxRate: parseInt(document.getElementById('settingTax').value),
                totalTables: parseInt(document.getElementById('settingTables').value)
            });
            hideSettings();
            renderFloorMap();
            showToast('Settings saved', 'success');
        }

        init();
    </script>
</body>

</html>
